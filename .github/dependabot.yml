version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    registries: "*"
    schedule:
      interval: "weekly"
    cooldown:
      # update-package-lock workflow handles minor/patch updates - delay for a few weeks to give time to handle breaking changes in those PRs
      default-days: 25
      semver-major-days: 5
registries:
  npm-npmjs:
    type: npm-registry
    url: https://npm.package-registry.brightspace.com/
    replaces-base: true
